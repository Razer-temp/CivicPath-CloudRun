steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/civicpath'
      - '--build-arg'
      - 'VITE_GOOGLE_TRANSLATE_API_KEY=$_VITE_GOOGLE_TRANSLATE_API_KEY'
      - '--build-arg'
      - 'VITE_GOOGLE_MAPS_API_KEY=$_VITE_GOOGLE_MAPS_API_KEY'
      - '--build-arg'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY'
      - '.'

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/civicpath']

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'civicpath'
      - '--image'
      - 'gcr.io/$PROJECT_ID/civicpath'
      - '--region'
      - 'asia-southeast1' # Change to your preferred region
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/civicpath'

substitutions:
  _VITE_GOOGLE_TRANSLATE_API_KEY: ''
  _VITE_GOOGLE_MAPS_API_KEY: ''
  _GEMINI_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
